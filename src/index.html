<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MinimalNotes — Editor de texto plano ultra-ligero">
  <title>MinimalNotes</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app" id="app">

  <!-- Spine: indicadores de notas (Sidebar minimal) -->
  <aside class="spine" id="spine"></aside>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <!-- Tabbar: pestañas draggables -->
    <div class="tabbar" id="tabbar"></div>

    <!-- EDITOR PANE -->
    <main class="editor-pane" id="editorPane">
      <!-- Se renderiza dinámicamente por editor.js -->
    </main>

  </div>

</div>

<!-- Módulos JS (ES Modules) -->
<script type="module" src="js/main.js"></script>

</body>
</html>
