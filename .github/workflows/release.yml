name: Release
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - run: npm ci

      - run: npm run tauri build -- --bundles appimage

      - name: Create .tar.gz
        run: |
          cd src-tauri/target/release
          tar -czf "minimalnotes-linux.tar.gz" minimalnotes

      - name: Rename AppImage
        run: |
          mv src-tauri/target/release/bundle/appimage/*.AppImage \
             src-tauri/target/release/bundle/appimage/MinimalNotes-linux.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: |
            src-tauri/target/release/minimalnotes-linux.tar.gz
            src-tauri/target/release/bundle/appimage/MinimalNotes-linux.AppImage

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - run: npm ci

      - run: npm run tauri build -- --bundles msi,nsis

      - name: Rename Windows installers
        shell: bash
        run: |
          mv src-tauri/target/release/bundle/msi/*.msi \
             src-tauri/target/release/bundle/msi/MinimalNotes-windows.msi
          mv src-tauri/target/release/bundle/nsis/*.exe \
             src-tauri/target/release/bundle/nsis/MinimalNotes-windows.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: |
            src-tauri/target/release/bundle/msi/MinimalNotes-windows.msi
            src-tauri/target/release/bundle/nsis/MinimalNotes-windows.exe

  archlinux:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            webkit2gtk-4.1 \
            gtk3 \
            base-devel \
            curl \
            wget \
            file \
            openssl \
            librsvg \
            xdotool \
            nodejs \
            npm \
            rust \
            git

      - run: npm ci

      - run: npm run tauri build

      - name: Create .tar.gz
        run: |
          cd src-tauri/target/release
          tar -czf "minimalnotes-linux.tar.gz" minimalnotes

      - name: Create .pkg.tar.zst
        run: |
          pkgver="${GITHUB_REF_NAME#v}"
          pkgrel=1
          pkgname=minimalnotes

          mkdir -p pkg/usr/bin pkg/usr/share/applications pkg/usr/share/pixmaps

          install -Dm755 "src-tauri/target/release/${pkgname}" \
            "pkg/usr/bin/${pkgname}"

          install -Dm644 "src-tauri/icons/icon.png" \
            "pkg/usr/share/pixmaps/${pkgname}.png"

          echo '[Desktop Entry]' > "pkg/usr/share/applications/${pkgname}.desktop"
          echo 'Type=Application' >> "pkg/usr/share/applications/${pkgname}.desktop"
          echo "Name=MinimalNotes" >> "pkg/usr/share/applications/${pkgname}.desktop"
          echo "Comment=Editor de texto plano ultra-ligero" >> "pkg/usr/share/applications/${pkgname}.desktop"
          echo "Exec=${pkgname}" >> "pkg/usr/share/applications/${pkgname}.desktop"
          echo "Icon=${pkgname}" >> "pkg/usr/share/applications/${pkgname}.desktop"
          echo 'Categories=Utility;TextEditor;' >> "pkg/usr/share/applications/${pkgname}.desktop"
          echo 'Terminal=false' >> "pkg/usr/share/applications/${pkgname}.desktop"

          {
            echo "pkgname = ${pkgname}"
            echo "pkgver = ${pkgver}-${pkgrel}"
            echo "pkgdesc = Editor de texto plano ultra-ligero"
            echo "url = https://github.com/Leo-Codex/NOTES"
            echo "builddate = $(date +%s)"
            echo "packager = MinimalNotes CI"
            echo "size = $(du -sk pkg | cut -f1)"
            echo "arch = x86_64"
            echo "license = MIT"
            echo "depend = webkit2gtk-4.1"
            echo "depend = gtk3"
            echo "depend = glibc"
          } > pkg/.PKGINFO

          bsdtar -czf pkg/.MTREE --format=mtree \
            --options='!all,use-set,type,uid,gid,mode,size,time,md5,sha256' \
            -C pkg usr/

          tar --zstd -cf \
            "minimalnotes-arch.pkg.tar.zst" \
            -C pkg .PKGINFO .MTREE usr/

      - uses: actions/upload-artifact@v4
        with:
          name: archlinux-bundle
          path: |
            src-tauri/target/release/minimalnotes-linux.tar.gz
            src-tauri/target/release/minimalnotes-arch.pkg.tar.zst

  release:
    needs: [linux, windows, archlinux]
    runs-on: ubuntu-latest
    steps:
      - name: Descargar todos los instaladores
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist-release

      - name: Publicar Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
