name: Release
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    permissions:
      contents: write
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libarchive-tools

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'v__VERSION__'
          releaseBody: 'Release generada automáticamente por GitHub Actions.'
          releaseDraft: true
          allowUpdates: true

      - name: Package Linux tar.gz and Pacman package
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cd src-tauri/target/release
          
          # 1. Crear el tar.gz portable (basado en GLIBC 2.35 para máxima compatibilidad)
          tar -czf "minimalnotes-linux.tar.gz" minimalnotes

          # 2. Preparar el directorio de empaquetado para Arch Linux
          mkdir -p pkg/usr/bin pkg/usr/share/applications pkg/usr/share/pixmaps
          install -Dm755 minimalnotes pkg/usr/bin/minimalnotes
          install -Dm644 ../../icons/icon.png pkg/usr/share/pixmaps/minimalnotes.png

          # 3. Crear el archivo Desktop Entry
          {
            echo '[Desktop Entry]'
            echo 'Type=Application'
            echo 'Name=MinimalNotes'
            echo 'Comment=Editor de texto plano ultra-ligero'
            echo 'Exec=minimalnotes'
            echo 'Icon=minimalnotes'
            echo 'Categories=Utility;TextEditor;'
            echo 'Terminal=false'
          } > pkg/usr/share/applications/minimalnotes.desktop

          # 4. Crear el archivo de metadatos .PKGINFO (usando la URL del repositorio actual)
          pkgver="${GITHUB_REF_NAME#v}"
          {
            echo "pkgname = minimalnotes"
            echo "pkgver = ${pkgver}-1"
            echo "pkgdesc = Editor de texto plano ultra-ligero"
            echo "url = https://github.com/${{ github.repository }}"
            echo "builddate = $(date +%s)"
            echo "packager = MinimalNotes CI"
            echo "size = $(du -sk pkg | cut -f1)"
            echo "arch = x86_64"
            echo "license = MIT"
            echo "depend = webkit2gtk-4.1"
            echo "depend = gtk3"
            echo "depend = glibc"
          } > pkg/.PKGINFO

          # 5. Generar estructura MTREE
          bsdtar -czf pkg/.MTREE --format=mtree \
            --options='!all,use-set,type,uid,gid,mode,size,time,md5,sha256' \
            -C pkg usr/

          # 6. Empaquetar como .pkg.tar.zst nativo de Pacman
          tar --zstd -cf "minimalnotes-arch.pkg.tar.zst" \
            -C pkg .PKGINFO .MTREE usr/

      - name: Upload additional Linux assets
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/minimalnotes-linux.tar.gz
            src-tauri/target/release/minimalnotes-arch.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
